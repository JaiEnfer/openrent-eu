apiVersion: apps/v1
kind: Deployment
metadata:
  name: openrent-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openrent-frontend
  template:
    metadata:
      labels:
        app: openrent-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/openrent-eu-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: openrent-frontend
spec:
  selector:
    app: openrent-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
