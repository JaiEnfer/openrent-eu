apiVersion: apps/v1
kind: Deployment
metadata:
  name: openrent-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openrent-backend
  template:
    metadata:
      labels:
        app: openrent-backend
    spec:
      containers:
        - name: backend
          image: your-registry/openrent-eu-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openrent-secrets
                  key: database_url
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: openrent-secrets
                  key: sentry_dsn
---
apiVersion: v1
kind: Service
metadata:
  name: openrent-backend
spec:
  selector:
    app: openrent-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
