apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openrent-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: openrent.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openrent-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: openrent-backend
                port:
                  number: 8000
  tls:
    - hosts:
        - openrent.example.com
      secretName: openrent-tls
